<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#041c42" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Emondt Bestelapp" />
  <link rel="manifest" href="manifest.json" />
  <title>Emondt – Materiaalverzoek</title>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet" />
  <style>
    /* ── EMONDT HUISSTIJL KLEUREN ──────────────────
       Donkerblauw (navy): #041c42
       Antraciet:          #22262A
       Licht groen:        #AEC336
       Beige:              #bba787
       Licht grijs:        #F8F8F8
    ─────────────────────────────────────────────── */
    :root {
      --bg:         #F8F8F8;
      --surface:    #ffffff;
      --border:     #dde1e6;
      --navy:       #041c42;
      --navy2:      #062860;
      --anthracite: #22262A;
      --green:      #AEC336;
      --green-light:#f0f5d6;
      --beige:      #bba787;
      --muted:      #8a9ab0;
      --text:       #22262A;
      --white:      #ffffff;
      --danger:     #c0392b;
      --radius:     8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Questrial', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
      box-shadow: 0 2px 12px rgba(4,28,66,0.22);
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--green);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .logo-name { font-size: 1.22rem; color: var(--white); letter-spacing: 0.01em; }
    .logo-sub  { font-size: 0.6rem; color: var(--green); letter-spacing: 0.14em; text-transform: uppercase; }
    .badge {
      background: var(--green);
      color: var(--navy);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: var(--navy);
      border-bottom: 3px solid var(--green);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1; min-width: 80px;
      padding: 10px 8px;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab.active { color: var(--white); border-bottom-color: var(--green); }

    /* ── SECTIONS ── */
    .section { display: none; padding: 16px; }
    .section.active { display: block; }

    /* ── CARDS ── */
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(4,28,66,0.06);
    }
    .info-card h2 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--green);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── FORM FIELDS ── */
    .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    input, textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Questrial', sans-serif;
      font-size: 0.92rem;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus { border-color: var(--green); background: #fff; }
    textarea { resize: vertical; min-height: 76px; }

    /* ── SEARCH ── */
    .search-bar {
      display: flex; align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0 12px;
      margin-bottom: 14px;
      gap: 8px;
      box-shadow: 0 1px 3px rgba(4,28,66,0.05);
    }
    .search-bar svg { color: var(--muted); flex-shrink: 0; }
    .search-bar input {
      background: transparent; border: none;
      padding: 12px 0; font-size: 0.92rem; box-shadow: none;
    }
    .search-bar input:focus { background: transparent; border: none; }

    /* ── CATEGORY LABEL ── */
    .cat-label {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--navy);
      padding: 12px 0 5px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .cat-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

    /* ── ARTIKEL KAART ── */
    .artikel-grid { display: flex; flex-direction: column; gap: 8px; }
    .artikel-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 1px 3px rgba(4,28,66,0.05);
      cursor: pointer;
    }
    .artikel-card.selected {
      border-color: var(--green);
      background: var(--green-light);
      box-shadow: 0 2px 8px rgba(174,195,54,0.18);
    }
    .artikel-icon {
      width: 40px; height: 40px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 1.1rem;
    }
    .artikel-card.selected .artikel-icon { background: #e2eba3; border-color: var(--green); }
    .artikel-info { flex: 1; min-width: 0; }
    .artikel-naam { font-size: 0.86rem; color: var(--anthracite); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artikel-code { font-size: 0.7rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }

    /* ── QTY ── */
    .qty-control {
      display: flex; align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      overflow: hidden; flex-shrink: 0;
    }
    .artikel-card.selected .qty-control { border-color: #c5d24a; background: #fff; }
    .qty-btn {
      width: 32px; height: 34px;
      background: none; border: none;
      color: var(--navy); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:active { background: #e8eef4; }
    .qty-val {
      width: 34px; text-align: center;
      font-size: 0.93rem; color: var(--navy);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 4px 0;
    }

    /* ── CART ── */
    .empty-cart { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-cart svg { opacity: 0.2; margin-bottom: 12px; color: var(--navy); }
    .empty-cart p { font-size: 0.86rem; line-height: 1.7; }

    .cart-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(4,28,66,0.05);
    }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-naam { font-size: 0.86rem; color: var(--anthracite); }
    .cart-item-code { font-size: 0.69rem; color: var(--muted); margin-top: 2px; }
    .cart-qty-badge {
      background: var(--navy); color: var(--white);
      font-size: 0.86rem;
      width: 34px; height: 34px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .remove-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 6px; border-radius: 6px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .remove-btn:active { color: var(--danger); background: #fdecea; }

    /* ── SUMMARY ── */
    .summary-box {
      background: var(--navy);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.81rem; padding: 3px 0;
      color: rgba(255,255,255,0.6);
    }
    .summary-row span:last-child { color: rgba(255,255,255,0.9); }
    .summary-row.total {
      border-top: 1px solid rgba(255,255,255,0.14);
      margin-top: 8px; padding-top: 10px;
      font-size: 0.9rem; color: var(--white);
    }
    .summary-row.total span:last-child { color: var(--green); }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      border-radius: var(--radius); border: none;
      font-family: 'Questrial', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 10px;
    }
    .btn:active { transform: scale(0.98); opacity: 0.88; }
    .btn-primary { background: var(--green); color: var(--navy); }
    .btn-danger { background: #fdecea; color: var(--danger); border: 1.5px solid #f5c6c2; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy); color: var(--white);
      font-size: 0.85rem;
      padding: 10px 20px;
      border-radius: 30px;
      border-left: 4px solid var(--green);
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap; pointer-events: none;
      box-shadow: 0 4px 16px rgba(4,28,66,0.22);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 18 L11 5 L19 18" stroke="#041c42" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7 12.5 L11 5 L15 12.5" stroke="#041c42" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">emondt</span>
      <span class="logo-sub">Materiaalverzoek</span>
    </div>
  </div>
  <div class="badge" id="cart-count-badge">0 items</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('artikelen')">📦 Artikelen</div>
  <div class="tab" onclick="showTab('winkelwagen')">🛒 Bestelling</div>
  <div class="tab" onclick="showTab('info')">👷 Monteur</div>
</div>

<!-- TAB: MONTEUR INFO -->
<div class="section" id="tab-info" style="display:none">
  <div class="info-card">
    <h2>Monteur gegevens</h2>
    <div class="field-row-2">
      <div class="field-row">
        <label>Naam</label>
        <input type="text" id="naam" placeholder="Jan de Vries" oninput="saveInfo()" />
      </div>
      <div class="field-row">
        <label>Personeelsnr.</label>
        <input type="text" id="personeelnr" placeholder="M-1042" oninput="saveInfo()" />
      </div>
    </div>
    <div class="field-row">
      <label>Afdeling / Ploeg</label>
      <input type="text" id="afdeling" placeholder="Onderhoud A" oninput="saveInfo()" />
    </div>
    <div class="field-row">
      <label>Werkorder / Projectnummer</label>
      <input type="text" id="werkorder" placeholder="WO-2024-0831" oninput="saveInfo()" />
    </div>
    <div class="field-row">
      <label>Locatie / Machine</label>
      <input type="text" id="locatie" placeholder="Hal 3 – Lijn B" oninput="saveInfo()" />
    </div>
  </div>
  <div class="info-card">
    <h2>Verzendadres</h2>
    <div class="field-row">
      <label>E-mail ontvanger (magazijn)</label>
      <input type="email" id="ontvanger" placeholder="magazijn@emondt.nl" oninput="saveInfo()" />
    </div>
    <div class="field-row">
      <label>Opmerkingen (optioneel)</label>
      <textarea id="opmerkingen" placeholder="Spoed, graag voor 14:00 leveren..." oninput="saveInfo()"></textarea>
    </div>
  </div>
</div>

<!-- TAB: ARTIKELEN -->
<div class="section" id="tab-artikelen" style="display:none">
  <div class="search-bar">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="zoek" placeholder="Zoek op naam of artikelnummer..." oninput="filterArtikelen()" />
  </div>
  <div class="artikel-grid" id="artikel-lijst"></div>
</div>

<!-- TAB: WINKELWAGEN -->
<div class="section" id="tab-winkelwagen" style="display:none">
  <div id="cart-content"></div>
</div>

<div id="toast">✓ Toegevoegd</div>

<script>
const ARTIKELEN = [
  { code: 'SM-001', naam: 'Universeel smeermiddel',    cat: 'Smeermiddelen',        eenheid: 'blik',  icon: '🟡' },
  { code: 'SM-002', naam: 'Hoogtemperatuurvet',         cat: 'Smeermiddelen',        eenheid: 'blik',  icon: '🟡' },
  { code: 'SM-003', naam: 'Hydrauliekolie ISO 46',      cat: 'Smeermiddelen',        eenheid: 'liter', icon: '🟡' },
  { code: 'SM-004', naam: 'Compressorolie SAE 30',      cat: 'Smeermiddelen',        eenheid: 'liter', icon: '🟡' },
  { code: 'BM-001', naam: 'Bouten M8x30 verzinkt',     cat: 'Bevestigingsmateriaal',eenheid: 'stuk',  icon: '🔩' },
  { code: 'BM-002', naam: 'Bouten M10x50 verzinkt',    cat: 'Bevestigingsmateriaal',eenheid: 'stuk',  icon: '🔩' },
  { code: 'BM-003', naam: 'Moer M8 inox',              cat: 'Bevestigingsmateriaal',eenheid: 'stuk',  icon: '🔩' },
  { code: 'BM-004', naam: 'Sluitring M10',             cat: 'Bevestigingsmateriaal',eenheid: 'stuk',  icon: '🔩' },
  { code: 'BM-005', naam: 'Popnagels 4x10mm',          cat: 'Bevestigingsmateriaal',eenheid: 'pak',   icon: '🔩' },
  { code: 'AF-001', naam: 'O-ring 50x3mm NBR',         cat: 'Afdichtingen',         eenheid: 'stuk',  icon: '⭕' },
  { code: 'AF-002', naam: 'Vlakke pakking 100x100mm',  cat: 'Afdichtingen',         eenheid: 'stuk',  icon: '⭕' },
  { code: 'AF-003', naam: 'Afdichtingstape PTFE 12mm', cat: 'Afdichtingen',         eenheid: 'rol',   icon: '⭕' },
  { code: 'AF-004', naam: 'Silicone kit grijs RTV',    cat: 'Afdichtingen',         eenheid: 'tube',  icon: '⭕' },
  { code: 'EL-001', naam: 'Zekering 10A traag',        cat: 'Elektrisch',           eenheid: 'stuk',  icon: '⚡' },
  { code: 'EL-002', naam: 'Zekering 16A snel',         cat: 'Elektrisch',           eenheid: 'stuk',  icon: '⚡' },
  { code: 'EL-003', naam: 'Krimpkous 4mm zwart',       cat: 'Elektrisch',           eenheid: 'meter', icon: '⚡' },
  { code: 'EL-004', naam: 'Lasdop 3-voudig blauw',     cat: 'Elektrisch',           eenheid: 'stuk',  icon: '⚡' },
  { code: 'EL-005', naam: 'Kabeltie 300mm zwart',      cat: 'Elektrisch',           eenheid: 'pak',   icon: '⚡' },
  { code: 'VB-001', naam: 'Poetsdoeken blauw',         cat: 'Verbruiksartikelen',   eenheid: 'rol',   icon: '🧻' },
  { code: 'VB-002', naam: 'Handschoenen nitril M',     cat: 'Verbruiksartikelen',   eenheid: 'doos',  icon: '🧤' },
  { code: 'VB-003', naam: 'Handschoenen nitril L',     cat: 'Verbruiksartikelen',   eenheid: 'doos',  icon: '🧤' },
  { code: 'VB-004', naam: 'Reinigingsspray contacten', cat: 'Verbruiksartikelen',   eenheid: 'bus',   icon: '🧴' },
  { code: 'VB-005', naam: 'Anti-roest spray',          cat: 'Verbruiksartikelen',   eenheid: 'bus',   icon: '🧴' },
  { code: 'GR-001', naam: 'Snijschijf 125mm metaal',  cat: 'Slijp & Snij',         eenheid: 'stuk',  icon: '🔵' },
  { code: 'GR-002', naam: 'Vlapsschijf 125mm',         cat: 'Slijp & Snij',         eenheid: 'stuk',  icon: '🔵' },
  { code: 'GR-003', naam: 'Boorbit HSS 6mm',           cat: 'Slijp & Snij',         eenheid: 'stuk',  icon: '🔵' },
  { code: 'GR-004', naam: 'Boorbit HSS 10mm',          cat: 'Slijp & Snij',         eenheid: 'stuk',  icon: '🔵' },
];

let cart = {};

window.onload = () => { loadInfo(); renderArtikelen(ARTIKELEN); showTab('artikelen'); };

function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const idx = { artikelen: 0, winkelwagen: 1, info: 2 };
  document.querySelectorAll('.tab')[idx[name]].classList.add('active');
  document.getElementById('tab-' + name).style.display = 'block';
  if (name === 'winkelwagen') renderCart();
}

function renderArtikelen(lijst) {
  const container = document.getElementById('artikel-lijst');
  container.innerHTML = '';
  [...new Set(lijst.map(a => a.cat))].forEach(cat => {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat;
    container.appendChild(lbl);
    lijst.filter(a => a.cat === cat).forEach(artikel => {
      const qty = cart[artikel.code] || 0;
      const el = document.createElement('div');
      el.className = 'artikel-card' + (qty > 0 ? ' selected' : '');
      el.id = 'card-' + artikel.code;
      el.innerHTML = `
        <div class="artikel-icon">${artikel.icon}</div>
        <div class="artikel-info">
          <div class="artikel-naam">${artikel.naam}</div>
          <div class="artikel-code">${artikel.code} · per ${artikel.eenheid}</div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${artikel.code}',-1,event)">−</button>
          <div class="qty-val" id="qty-${artikel.code}">${qty}</div>
          <button class="qty-btn" onclick="changeQty('${artikel.code}',1,event)">+</button>
        </div>`;
      el.onclick = e => { if (!e.target.closest('.qty-control')) changeQty(artikel.code, 1, e); };
      container.appendChild(el);
    });
  });
}

function filterArtikelen() {
  const q = document.getElementById('zoek').value.toLowerCase();
  renderArtikelen(ARTIKELEN.filter(a => a.naam.toLowerCase().includes(q) || a.code.toLowerCase().includes(q)));
}

function changeQty(code, delta, e) {
  if (e) e.stopPropagation();
  const nieuw = Math.max(0, (cart[code] || 0) + delta);
  if (nieuw === 0) delete cart[code]; else cart[code] = nieuw;
  const qEl = document.getElementById('qty-' + code);
  const cEl = document.getElementById('card-' + code);
  if (qEl) qEl.textContent = nieuw;
  if (cEl) cEl.classList.toggle('selected', nieuw > 0);
  updateBadge();
  if (delta > 0 && nieuw === 1) showToast('✓ Toegevoegd aan bestelling');
}

function updateBadge() {
  const t = Object.values(cart).reduce((s, q) => s + q, 0);
  document.getElementById('cart-count-badge').textContent = t + ' item' + (t !== 1 ? 's' : '');
}

function renderCart() {
  const el = document.getElementById('cart-content');
  const items = Object.entries(cart);
  if (!items.length) {
    el.innerHTML = `<div class="empty-cart">
      <svg width="54" height="54" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <p>Geen artikelen geselecteerd.<br>Ga naar <strong>Artikelen</strong> om te beginnen.</p>
    </div>`;
    return;
  }
  let html = '', totaal = 0;
  items.forEach(([code, qty]) => {
    const a = ARTIKELEN.find(x => x.code === code); if (!a) return;
    totaal += qty;
    html += `<div class="cart-item">
      <div class="artikel-icon" style="width:38px;height:38px;font-size:1rem;">${a.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-naam">${a.naam}</div>
        <div class="cart-item-code">${a.code} · per ${a.eenheid}</div>
      </div>
      <div class="cart-qty-badge">${qty}</div>
      <button class="remove-btn" onclick="removeItem('${code}')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>`;
  });
  const inf = getInfo();
  html += `<div class="summary-box">
    <div class="summary-row"><span>Monteur</span><span>${inf.naam || '—'}</span></div>
    <div class="summary-row"><span>Werkorder</span><span>${inf.werkorder || '—'}</span></div>
    <div class="summary-row"><span>Locatie</span><span>${inf.locatie || '—'}</span></div>
    <div class="summary-row total"><span>Totaal</span><span>${totaal} stuks</span></div>
  </div>
  <button class="btn btn-primary" onclick="verstuurEmail()">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7z"/>
    </svg>
    Versturen via E-mail
  </button>
  <button class="btn btn-danger" onclick="leegMaken()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
    </svg>
    Bestelling wissen
  </button>`;
  el.innerHTML = html;
}

function removeItem(code) {
  delete cart[code];
  const qEl = document.getElementById('qty-' + code);
  const cEl = document.getElementById('card-' + code);
  if (qEl) qEl.textContent = 0;
  if (cEl) cEl.classList.remove('selected');
  updateBadge(); renderCart();
}

function leegMaken() {
  if (!confirm('Hele bestelling wissen?')) return;
  cart = {};
  document.querySelectorAll('.qty-val').forEach(el => el.textContent = '0');
  document.querySelectorAll('.artikel-card').forEach(el => el.classList.remove('selected'));
  updateBadge(); renderCart();
}

function verstuurEmail() {
  const inf = getInfo();
  const items = Object.entries(cart);
  if (!items.length) { alert('Voeg eerst artikelen toe.'); return; }
  if (!inf.ontvanger) { alert('Vul eerst een e-mailadres in bij het Monteur tabblad.'); showTab('info'); return; }

  const datum = new Date().toLocaleDateString('nl-NL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  let body = `MATERIAALVERZOEK – EMONDT GROEP\n${'='.repeat(44)}\n\n`;
  body += `Datum:         ${datum}\n`;
  body += `Monteur:       ${inf.naam || '—'}\n`;
  body += `Personeelsnr:  ${inf.personeelnr || '—'}\n`;
  body += `Afdeling:      ${inf.afdeling || '—'}\n`;
  body += `Werkorder:     ${inf.werkorder || '—'}\n`;
  body += `Locatie:       ${inf.locatie || '—'}\n\n`;
  body += `GEVRAAGDE ARTIKELEN\n${'─'.repeat(44)}\n`;
  let totaal = 0;
  items.forEach(([code, qty]) => {
    const a = ARTIKELEN.find(x => x.code === code); if (!a) return;
    totaal += qty;
    body += `${a.code.padEnd(10)} ${String(qty).padStart(4)} x  ${a.naam} (per ${a.eenheid})\n`;
  });
  body += `${'─'.repeat(44)}\nTOTAAL: ${totaal} artikelen\n`;
  if (inf.opmerkingen) body += `\nOPMERKINGEN\n${inf.opmerkingen}\n`;
  body += `\n${'='.repeat(44)}\nVerstuurd via Emondt Materiaalverzoek App\nwww.emondt.nl`;

  const subject = `Materiaalverzoek${inf.werkorder ? ' ' + inf.werkorder : ''} – ${inf.naam || 'monteur'} – ${datum}`;
  window.location.href = `mailto:${inf.ontvanger}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  showToast('📧 E-mail app geopend');
}

function saveInfo() {
  try { localStorage.setItem('emondt_info', JSON.stringify(getInfo())); } catch(e) {}
}
function loadInfo() {
  try {
    const s = JSON.parse(localStorage.getItem('emondt_info') || '{}');
    ['naam','personeelnr','afdeling','werkorder','locatie','ontvanger','opmerkingen']
      .forEach(id => { document.getElementById(id).value = s[id] || ''; });
  } catch(e) {}
}
function getInfo() {
  return ['naam','personeelnr','afdeling','werkorder','locatie','ontvanger','opmerkingen']
    .reduce((o, id) => { o[id] = document.getElementById(id).value; return o; }, {});
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
